# KAP worker_poll yerine CDS + Brand icin tek hedef.
# cron-job.org: .../actions/workflows/cds_brand_worker_poll.yml/dispatches
name: CDS Brand Worker Poll

on:
  schedule:
    - cron: "4,9,14,19,24,29,34,39,44,49,54,59 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cds-brand-worker-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bagimliliklar
        run: pip install -r requirements.txt

      - name: Secret kontrolu
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python -c "import os,sys; missing=[k for k in ['DATABASE_URL','TELEGRAM_BOT_TOKEN'] if not os.getenv(k)]; print('Eksik:', missing) if missing else print('Secrets OK'); sys.exit(1 if missing else 0)"

      - name: CDS worker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python cds_worker_once.py

      - name: Brand worker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python brand_worker_once.py

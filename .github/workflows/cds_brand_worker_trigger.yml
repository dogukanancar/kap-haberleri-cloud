# KAP Worker Zamanlayici ile ayni model: sabit aralikla workflow_dispatch.
name: CDS Brand Worker Zamanlayici

on:
  schedule:
    - cron: "4,9,14,19,24,29,34,39,44,49,54,59 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: cds-brand-worker-trigger
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: CDS Worker'i tetikle
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "cds_worker.yml",
              ref: "main",
            });
            core.info("cds_worker.yml tetiklendi.");
      - name: Brand Worker'i tetikle
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "brand_worker.yml",
              ref: "main",
            });
            core.info("brand_worker.yml tetiklendi.");
